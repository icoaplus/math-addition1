<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>算数ブロック学習（サウンド付）</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            margin: 0;
            padding-top: 40px;
            background-color: #f8f9fa;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            touch-action: manipulation;
            user-select: none;
        }

        .formula-container {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 50px;
            font-size: 45px;
            font-weight: bold;
        }

        .input-box {
            width: 80px;
            height: 80px;
            border: 4px solid #444;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: white;
            cursor: pointer;
        }

        .input-box.red-text { color: #e74c3c; border-color: #e74c3c; }
        .input-box.blue-text { color: #3498db; border-color: #3498db; }
        .input-box.ans-text { background-color: #ffeaa7; }

        .container {
            display: flex;
            gap: 6px;
            padding: 25px;
            background: #ecf0f1;
            border-radius: 15px;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.1);
        }

        .block-unit {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 55px;
        }

        .num-label-top { height: 35px; font-size: 20px; font-weight: bold; color: #555; margin-bottom: 5px; }
        .block { width: 50px; height: 50px; border: 2px solid #bdc3c7; background-color: white; border-radius: 6px; }
        .num-label-bottom { height: 35px; font-size: 20px; font-weight: bold; color: #7f8c8d; margin-top: 8px; }

        .is-red { background-color: #e74c3c; border-color: #c0392b; }
        .is-blue { background-color: #3498db; border-color: #2980b9; }

        .controls { margin-top: 50px; }
        .reset-btn {
            padding: 18px 50px; font-size: 22px; background-color: #2d3436; color: white;
            border: none; border-radius: 50px; cursor: pointer; box-shadow: 0 4px #000;
        }
        .reset-btn:active { box-shadow: 0 1px #000; transform: translateY(3px); }
    </style>
</head>
<body>

    <div class="formula-container">
        <div class="input-box red-text" id="box1" onclick="confirmNum(1)"></div>
        <span>＋</span>
        <div class="input-box blue-text" id="box2" onclick="confirmNum(2)"></div>
        <span>＝</span>
        <div class="input-box ans-text" id="boxAns" onclick="showAns()"></div>
    </div>

    <div class="container" id="stage"></div>

    <div class="controls">
        <button class="reset-btn" onclick="resetGame()">ぜんぶ 消す（リセット）</button>
    </div>

    <script>
        const stage = document.getElementById('stage');
        const box1 = document.getElementById('box1');
        const box2 = document.getElementById('box2');
        const boxAns = document.getElementById('boxAns');

        let mode = 'red'; 
        let redCount = 0;
        let blueCount = 0;

        // オーディオ設定
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(type) {
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            if (type === 'tap') { // ポンッ
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(440, audioCtx.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(110, audioCtx.currentTime + 0.1);
                gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'confirm') { // カチッ
                oscillator.type = 'square';
                oscillator.frequency.setValueAtTime(880, audioCtx.currentTime);
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.05);
            } else if (type === 'correct') { // ファンファーレ風
                [523.25, 659.25, 783.99].forEach((f, i) => {
                    const osc = audioCtx.createOscillator();
                    const g = audioCtx.createGain();
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(f, audioCtx.currentTime + i * 0.1);
                    osc.connect(g);
                    g.connect(audioCtx.destination);
                    g.gain.setValueAtTime(0.2, audioCtx.currentTime + i * 0.1);
                    g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + i * 0.1 + 0.3);
                    osc.start(audioCtx.currentTime + i * 0.1);
                    osc.stop(audioCtx.currentTime + i * 0.1 + 0.3);
                });
            }
        }

        function init() {
            stage.innerHTML = '';
            for (let i = 1; i <= 10; i++) {
                const unit = document.createElement('div');
                unit.className = 'block-unit';
                unit.innerHTML = `
                    <div class="num-label-top" id="T${i}"></div>
                    <div class="block" id="B${i}" onclick="tapBlock(${i})"></div>
                    <div class="num-label-bottom" id="L${i}"></div>
                `;
                stage.appendChild(unit);
            }
        }

        function tapBlock(idx) {
            if (mode === 'locked') return; 
            const totalNow = redCount + blueCount;

            if (mode === 'red') {
                if (idx === redCount + 1 && redCount < 10) {
                    redCount++;
                    document.getElementById('B'+idx).classList.add('is-red');
                    document.getElementById('T'+idx).innerText = redCount;
                    document.getElementById('L'+idx).innerText = redCount;
                    playSound('tap');
                } else if (idx === redCount && redCount > 0) {
                    document.getElementById('B'+idx).classList.remove('is-red');
                    document.getElementById('T'+idx).innerText = '';
                    document.getElementById('L'+idx).innerText = '';
                    redCount--;
                }
            } else if (mode === 'blue') {
                if (idx === totalNow + 1 && totalNow < 10) {
                    blueCount++;
                    const newTotal = redCount + blueCount;
                    document.getElementById('B'+idx).classList.add('is-blue');
                    document.getElementById('T'+idx).innerText = blueCount;
                    document.getElementById('L'+idx).innerText = newTotal;
                    playSound('tap');
                } else if (idx === totalNow && blueCount > 0) {
                    document.getElementById('B'+idx).classList.remove('is-blue');
                    document.getElementById('T'+idx).innerText = '';
                    document.getElementById('L'+idx).innerText = '';
                    blueCount--;
                }
            }
        }

        function confirmNum(num) {
            if (num === 1 && redCount > 0) {
                box1.innerText = redCount;
                mode = 'blue'; 
                playSound('confirm');
            } else if (num === 2 && blueCount > 0) {
                box2.innerText = blueCount;
                mode = 'locked'; 
                playSound('confirm');
            }
        }

        function showAns() {
            if (box1.innerText !== "" && box2.innerText !== "") {
                boxAns.innerText = redCount + blueCount;
                playSound('correct');
            }
        }

        function resetGame() {
            redCount = 0;
            blueCount = 0;
            mode = 'red';
            box1.innerText = '';
            box2.innerText = '';
            boxAns.innerText = '';
            init();
            if(audioCtx.state === 'suspended') audioCtx.resume();
        }

        init();
    </script>
</body>
</html>
